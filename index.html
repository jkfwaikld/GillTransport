<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gill Transport Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50">
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const { useState, useEffect } = React;

      function App() {
        const [time, setTime] = useState(new Date().toLocaleTimeString('en-IN', { timeZone: 'Asia/Kolkata' }));
        const [drivers, setDrivers] = useState([
          { id: 1, name: 'Driver A', status: 'Out' },
          { id: 2, name: 'Driver B', status: 'Out' },
          { id: 3, name: 'Driver C', status: 'Out' }
        ]);

        useEffect(() => {
          const timer = setInterval(() => {
            setTime(new Date().toLocaleTimeString('en-IN', { timeZone: 'Asia/Kolkata' }));
          }, 1000);
          return () => clearInterval(timer);
        }, []);

        const toggleStatus = (id, newStatus) => {
          setDrivers(drivers.map(d => d.id === id ? { ...d, status: newStatus } : d));
        };

        return (
          <div className="min-h-screen p-4 md:p-10 max-w-4xl mx-auto">
            <header className="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
              <h1 className="text-3xl font-extrabold text-blue-900 tracking-tight">Gill Transport</h1>
              <div className="bg-blue-600 text-white px-6 py-2 rounded-2xl shadow-lg font-mono text-xl">
                {time} <span className="text-sm ml-1 opacity-80">IST</span>
              </div>
            </header>

            <div className="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
              <div className="p-6 border-b border-gray-100 bg-gray-50/50">
                <h2 className="text-gray-500 font-semibold uppercase text-xs tracking-widest">Daily Attendance</h2>
              </div>
              <div className="divide-y divide-gray-100">
                {drivers.map((driver) => (
                  <div key={driver.id} className="p-6 flex flex-col sm:flex-row justify-between items-center gap-4 transition hover:bg-blue-50/30">
                    <div className="flex items-center gap-4">
                      <div className={`w-3 h-3 rounded-full ${driver.status === 'In' ? 'bg-green-500 animate-pulse' : 'bg-gray-300'}`}></div>
                      <span className="font-bold text-xl text-gray-800">{driver.name}</span>
                    </div>
                    <div className="flex gap-2">
                      <button 
                        onClick={() => toggleStatus(driver.id, 'In')}
                        className={`px-6 py-2 rounded-xl font-bold transition-all ${driver.status === 'In' ? 'bg-green-100 text-green-700' : 'bg-white border-2 border-green-500 text-green-600 hover:bg-green-50'}`}>
                        Check In
                      </button>
                      <button 
                        onClick={() => toggleStatus(driver.id, 'Out')}
                        className={`px-6 py-2 rounded-xl font-bold transition-all ${driver.status === 'Out' ? 'bg-red-100 text-red-700' : 'bg-white border-2 border-red-500 text-red-600 hover:bg-red-50'}`}>
                        Check Out
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
